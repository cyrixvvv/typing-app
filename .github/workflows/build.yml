name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    # ── SSH 调试开关 ──
    #    触发方式：在 PR 评论区发送 /debug 命令
    #    断开 SSH 即可关闭调试模式
    #    关闭方式：在 PR 评论区发送 /end-ssh 命令
    #    或重新触发 workflow
    continue-on-error: true

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 配置 Java 17 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. 安装 SSH，开启调试模式 ──
      - name: Setup SSH for debugging
        uses: lhotari/action-upterm@v1
        if: false
        with:
          limit-access-to-actor: false
          limit-access-to-users: cyrixvvv

      # ── 4. 安装 Android SDK Command Line Tools ──
      #    用官方 action，PATH 和环境变量自动处理
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
          packages: |
            platforms;android-33
            build-tools;33.0.2
            platform-tools

      # ── 5. 生成 Gradle Wrapper（项目没有 gradlew） ──
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      # ── 6. 编译 Debug APK ──
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ── 7. 运行单元测试 ──
      - name: Run unit tests
        run: ./gradlew test

      # ── 8. 上传构建产物 ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
