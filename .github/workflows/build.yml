name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 配置 Java 17 ──
      #    AGP 7.4+ 需要 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. 安装 Gradle（用于生成 wrapper） ──
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      # ── 4. 生成 Gradle Wrapper ──
      #    项目没有 gradlew，CI 首次需要生成
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      # ── 5. 设置 Android SDK ──
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
          packages: |
            platform-tools
            build-tools;33.0.2
            android-33
            emulator

      # ── 6. 编译 Debug APK ──
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ── 7. 运行单元测试 ──
      - name: Run unit tests
        run: ./gradlew test

      # ── 8. 上传构建产物 ──
      #    APK 保留 7 天，方便下载测试
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
