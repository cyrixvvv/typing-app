name: Build Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION_CODE=$(grep '^VERSION_CODE=' gradle.properties | cut -d'=' -f2)
          VERSION_NAME=$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2)
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Building version $VERSION_NAME (code $VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12.0'
          packages: "platforms;android-33 build-tools;33.0.2 platform-tools"

      - name: Clear stale build artifacts
        run: |
          ./gradlew clean || true
          rm -rf ~/.gradle/caches/build-cache-* || true
          rm -rf .gradle 2>/dev/null || true
          find . \( -name "*.kt" -o -name "*.xml" -o -name "*.gradle" -o -name "*.java" \) -exec touch {} \;

      - name: Build Release APKs (armeabi-v7a + arm64-v8a)
        run: |
          EXIT_CODE=0
          ./gradlew assembleRelease --no-build-cache --rerun-tasks 2>&1 | tee /tmp/build_output.txt || EXIT_CODE=$?
          echo "--- BUILD OUTPUT (last 30 lines) ---"
          tail -30 /tmp/build_output.txt
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Build failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Debug APK paths
        run: find app/build/outputs/apk/release -name "*.apk" -ls 2>/dev/null || echo "No APKs found"
        # 实际文件名: app-armeabi-v7a-release-unsigned.apk / app-arm64-v8a-release-unsigned.apk

      - name: Upload Release APK - armeabi-v7a
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-armeabi-v7a-v${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk
          retention-days: 7

      - name: Upload Release APK - arm64-v8a
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-arm64-v8a-v${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk
          retention-days: 7

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version_name }} (code ${{ steps.version.outputs.version_code }})" >> $GITHUB_STEP_SUMMARY
          echo "- APK (armeabi-v7a): app/build/outputs/apk/release/*-v7a.apk" >> $GITHUB_STEP_SUMMARY
          echo "- APK (arm64-v8a): app/build/outputs/apk/release/*-v8a.apk" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "- **SUCCESS** ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **FAILED** ❌ — check logs above" >> $GITHUB_STEP_SUMMARY
          fi