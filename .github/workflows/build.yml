name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 配置 Java 17 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. 安装 Android SDK Command Line Tools ──
      #    官方推荐：下载 SDK tools ZIP 并解压
      - name: Set up Android SDK
        run: |
          cd $(dirname ${{ github.workspace }})
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 4. 生成 Gradle Wrapper（项目没有 gradlew） ──
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      # ── 5. 编译 Debug APK ──
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ── 6. 运行单元测试 ──
      - name: Run unit tests
        run: ./gradlew test

      # ── 7. 上传构建产物 ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
