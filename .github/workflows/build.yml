name: Build Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12.0'
          packages: "platforms;android-33 build-tools;33.0.2 platform-tools"

      - name: Build Release APKs (armeabi-v7a + arm64-v8a)
        run: ./gradlew assembleRelease

      - name: Upload Release APK - armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: app-release-armeabi-v7a
          path: app/build/outputs/apk/release/*-v7a.apk
          retention-days: 7

      - name: Upload Release APK - arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: app-release-arm64-v8a
          path: app/build/outputs/apk/release/*-v8a.apk
          retention-days: 7
