name: Build Release APK

on:
  push:
    branches: [master]
    paths:
      - 'gradle.properties'
      - 'app/build.gradle'
      - '.github/workflows/build.yml'
      - 'app/src/**'

  workflow_dispatch:
    inputs:
      skip_release:
        description: 'skip release (build+artifact only)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION_CODE=$(grep '^VERSION_CODE=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          VERSION_NAME=$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "::notice::Building version $VERSION_NAME (code $VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12.0'
          packages: "platforms;android-33 build-tools;33.0.2 platform-tools"

      - name: Generate keystore via Python
        id: keystore
        run: |
          python3 -c "
          from subprocess import run
          import base64, os, tempfile
          # Generate a self-signed certificate + keystore using keytool (JDK bundled)
          # Use a temp dir for GNUPGHOME workaround - but we use keytool not GPG
          with tempfile.TemporaryDirectory() as tmpdir:
              ks = tmpdir + '/release.keystore'
              # Generate keypair + keystore in one step using keytool
              r = run([
                  'keytool', '-genkeypair',
                  '-keystore', ks,
                  '-alias', 'typing-release',
                  '-keyalg', 'RSA', '-keysize', '2048',
                  '-validity', '10000',
                  '-storepass', 'Ty2026Pass!!',
                  '-keypass', 'Ty2026Pass!!',
                  '-dname', 'CN=typing-release, OU=dev, O=honglu, L=sz, ST=gd, C=cn',
                  '-v'
              ], capture_output=True, text=True)
              if r.returncode != 0:
                  print('keytool stdout:', r.stdout)
                  print('keytool stderr:', r.stderr, file=__import__('sys').stderr)
                  __import__('sys').exit(1)
              with open(ks, 'rb') as f:
                  b64 = base64.b64encode(f.read()).decode()
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('keystore_b64=' + b64 + '\n')
              print('Keystore generated successfully')
          "

      - name: Write keystore to disk
        run: |
          KEYSTORE_B64="${{ steps.keystore.outputs.keystore_b64 }}"
          echo "KEystore size: ${#KEYSTORE_B64} chars"
          mkdir -p /tmp/keystore
          echo "$KEYSTORE_B64" | base64 -d > /tmp/keystore/release.keystore
          echo "RELEASE_KEYSTORE_FILE=/tmp/keystore/release.keystore" >> $GITHUB_ENV
          echo "RELEASE_KEYSTORE_PASSWORD=Ty2026Pass!!" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=typing-release" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=Ty2026Pass!!" >> $GITHUB_ENV
          echo "::notice::Keystore written to /tmp/keystore/release.keystore"

      - name: Clear stale build artifacts
        run: |
          ./gradlew clean || true
          rm -rf ~/.gradle/caches/build-cache-* || true
          rm -rf .gradle 2>/dev/null || true
          find . \( -name "*.kt" -o -name "*.xml" -o -name "*.gradle" -o -name "*.java" \) -exec touch {} \;

      - name: Build Release APKs
        id: build
        run: |
          EXIT_CODE=0
          ./gradlew assembleRelease --no-build-cache --rerun-tasks 2>&1 | tee /tmp/build_output.txt || EXIT_CODE=$?
          tail -30 /tmp/build_output.txt
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Build failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Find built APKs
        id: apks
        run: |
          echo "=== APKs ==="
          find app/build/outputs/apk -name "*.apk" -type f | while read f; do
            echo "  $f ($(du -h "$f" | cut -f1))"
          done
          echo "apk_v7a=app/build/outputs/apk/release/app-armeabi-v7a-release.apk" >> $GITHUB_OUTPUT
          echo "apk_v8a=app/build/outputs/apk/release/app-arm64-v8a-release.apk" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        if: github.event.inputs.skip_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-${{ steps.version.outputs.version_name }}
          path: ${{ steps.apks.outputs.apk_v7a }}
          retention-days: 30

      - name: Upload artifacts (arm64-v8a)
        if: github.event.inputs.skip_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-${{ steps.version.outputs.version_name }}
          path: ${{ steps.apks.outputs.apk_v8a }}
          retention-days: 30

      - name: Delete old release
        if: github.event.inputs.skip_release != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag_name }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
          echo "Cleaned: $TAG"

      - name: Create Release
        if: github.event.inputs.skip_release != 'true'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.version_name }}
          draft: false
          prerelease: false
          replace: true
          generate_release_notes: true
          files: |
            ${{ steps.apks.outputs.apk_v7a }}
            ${{ steps.apks.outputs.apk_v8a }}

      - name: Summary
        if: always()
        run: |
          echo "## Build ${{ steps.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "APK: ${{ steps.apks.outputs.apk_v7a }}" >> $GITHUB_STEP_SUMMARY
          echo "APK: ${{ steps.apks.outputs.apk_v8a }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ steps.apks.outputs.apk_v7a }}" ]; then
            echo "**SUCCESS**" >> $GITHUB_STEP_SUMMARY
          fi