name: Build Release APK

on:
  # ============================================================
  # 【已注释】push 触发 — 需要恢复时手动取消注释以下 3 行
  # ============================================================
  # push:
  #   branches: [master]
  # ============================================================

  # 监控 gradle.properties 变动 → 推送该文件时自动触发构建并发布 Release
  push:
    branches: [master]
    paths:
      - 'gradle.properties'
      - 'app/build.gradle'
      - '.github/workflows/build.yml'

  # 手动触发（可指定版本参数）
  workflow_dispatch:
    inputs:
      skip_release:
        description: '跳过 GitHub Release 创建（仅构建）'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION_CODE=$(grep '^VERSION_CODE=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          VERSION_NAME=$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "::notice::Building version $VERSION_NAME (code $VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12.0'
          packages: "platforms;android-33 build-tools;33.0.2 platform-tools"

      - name: Clear stale build artifacts
        run: |
          ./gradlew clean || true
          rm -rf ~/.gradle/caches/build-cache-* || true
          rm -rf .gradle 2>/dev/null || true
          find . \( -name "*.kt" -o -name "*.xml" -o -name "*.gradle" -o -name "*.java" \) -exec touch {} \;

      - name: Build Release APKs (armeabi-v7a + arm64-v8a)
        id: build
        run: |
          EXIT_CODE=0
          ./gradlew assembleRelease --no-build-cache --rerun-tasks 2>&1 | tee /tmp/build_output.txt || EXIT_CODE=$?
          echo "--- Last 30 build output lines ---"
          tail -30 /tmp/build_output.txt
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Build failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Find built APKs
        id: apks
        run: |
          echo "=== Available APKs ==="
          find app/build/outputs/apk -name "*.apk" -type f
          APK_V7A=$(find app/build/outputs/apk -name "*-v7a-*.apk" | head -1)
          APK_V8A=$(find app/build/outputs/apk -name "*-v8a-*.apk" | head -1)
          echo "apk_v7a=$APK_V7A" >> $GITHUB_OUTPUT
          echo "apk_v8a=$APK_V8A" >> $GITHUB_OUTPUT

      # ============================================================
      # 【跳过 Release 创建时的制品留存】
      # ============================================================
      - name: Upload Release APK (armeabi-v7a) — artifacts fallback
        if: github.event.inputs.skip_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-armeabi-v7a-v${{ steps.version.outputs.version_name }}
          path: ${{ steps.apks.outputs.apk_v7a }}
          retention-days: 7

      - name: Upload Release APK (arm64-v8a) — artifacts fallback
        if: github.event.inputs.skip_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-arm64-v8a-v${{ steps.version.outputs.version_name }}
          path: ${{ steps.apks.outputs.apk_v8a }}
          retention-days: 7

      # ============================================================
      # 【自动发布到 GitHub Release】
      # 触发条件：gradle.properties 推送 或 workflow_dispatch（未勾选 skip_release）
      # ============================================================
      - name: Create GitHub Release
        if: github.event.inputs.skip_release != 'true'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.version_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.apks.outputs.apk_v7a }}
            ${{ steps.apks.outputs.apk_v8a }}
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | **${{ steps.version.outputs.version_name }}** (code `${{ steps.version.outputs.version_code }}`) |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.version.outputs.tag_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK (armeabi-v7a) | \`${{ steps.apks.outputs.apk_v7a }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK (arm64-v8a) | \`${{ steps.apks.outputs.apk_v8a }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.skip_release }}" != "true" ]; then
            echo "| Release | https://github.com/${{ github.repository }}/releases/${{ steps.version.outputs.tag_name }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "${{ steps.apks.outputs.apk_v7a }}" ] && [ -f "${{ steps.apks.outputs.apk_v8a }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**✅ BUILD & RELEASE SUCCESS**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ BUILD FAILED** — check logs above" >> $GITHUB_STEP_SUMMARY
          fi