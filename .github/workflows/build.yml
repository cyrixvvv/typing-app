name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 配置 Java 17 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. 安装 Android SDK ──
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12.0'
          packages: "platforms;android-33 build-tools;33.0.2 platform-tools"

      # ── 4. 编译 Debug APK ──
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ── 5. 运行单元测试 ──
      - name: Run unit tests
        run: ./gradlew test

      # ── 6. 上传构建产物 ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
