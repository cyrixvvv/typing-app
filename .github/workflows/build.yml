name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 配置 Java 17 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. 安装 Android SDK ──
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12.0'
          packages: "platforms;android-33 build-tools;33.0.2 platform-tools"

      # ── 4. 编译 Debug APK（双 ABI） ──
      - name: Build Debug APKs
        run: ./gradlew assembleDebug

      # ── 5. 编译 Release APK（双 ABI + 签名） ──
      - name: Build Release APKs
        run: ./gradlew assembleRelease

      # ── 6. 运行单元测试 ──
      - name: Run unit tests
        run: ./gradlew test

      # ── 7. 上传 Debug APK ──
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-armeabi-v7a
          path: app/build/outputs/apk/debug/*-v7a.apk
          retention-days: 7

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-arm64-v8a
          path: app/build/outputs/apk/debug/*-v8a.apk
          retention-days: 7

      # ── 8. 上传 Release APK ──
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-armeabi-v7a
          path: app/build/outputs/apk/release/*-v7a.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-arm64-v8a
          path: app/build/outputs/apk/release/*-v8a.apk
          retention-days: 7
